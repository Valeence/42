services:

  backend:
    container_name: backend
    build: ./backend
    env_file: 
      - ./.env
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - transcendence_network
    restart: unless-stopped
  
  frontend:
    build: ./frontend
    container_name: frontend
    env_file: 
      - ./.env
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - transcendence_network
    restart: unless-stopped
  

networks:
  transcendence_network:
    driver: bridge
